{"name":"Update GUMA OS","on":{"workflow_dispatch":{},"schedule":[{"cron":"15 6 * * *"}]},"permissions":{"contents":"write"},"concurrency":{"group":"guma-os-publish","cancel-in-progress":false},"jobs":{"update":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4","with":{"ref":"main","fetch-depth":0,"persist-credentials":true}},{"name":"Sync main before update","run":"git fetch origin main\ngit checkout main\ngit reset --hard origin/main"},{"name":"Download GUMA OS publish ZIP","run":"CACHE_BUST=\"$(date +%s)\"\ncurl -L --fail -H \"Cache-Control: no-cache\" \"https://drive.google.com/uc?export=download&id=1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J&cacheBust=${CACHE_BUST}\" -o guma_os_publish.zip\nfile guma_os_publish.zip\nunzip -l guma_os_publish.zip"},{"name":"Unpack update","run":"unzip -o guma_os_publish.zip\nrm guma_os_publish.zip"},{"name":"Validate JSON","run":"jq empty data/latest.json\njq empty data/manifest.json\nfind data/reports -name \"*.json\" -print0 | xargs -0 -I {} jq empty \"{}\"\necho \"Manifest after unpack:\"\njq '.reports[].date' data/manifest.json"},{"name":"Commit and push changes","run":"git config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit status --short\ngit add index.html assets data reports .nojekyll README.md\nif git diff --cached --quiet; then\n  echo \"No GUMA OS changes to publish.\"\n  exit 0\nfi\ngit commit -m \"Update GUMA OS\"\ngit fetch origin main\ngit push --force-with-lease origin HEAD:main"}]}}}
