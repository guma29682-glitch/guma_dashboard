name: Update GUMA OS

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

concurrency:
  group: guma-os-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Sync main before update
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Download GUMA OS publish ZIP
        run: |
          CACHE_BUST="$(date +%s)"
          curl -L --fail \
            -H "Cache-Control: no-cache" \
            "https://drive.google.com/uc?export=download&id=1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J&cacheBust=${CACHE_BUST}" \
            -o guma_os_publish.zip
          file guma_os_publish.zip
          unzip -l guma_os_publish.zip

      - name: Unpack update
        run: |
          unzip -o guma_os_publish.zip
          rm guma_os_publish.zip

      - name: Validate JSON
        run: |
          jq empty data/latest.json
          jq empty data/manifest.json
          find data/reports -name "*.json" -print0 | xargs -0 -I {} jq empty "{}"
          echo "Manifest after unpack:"
          jq '.reports[].date' data/manifest.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add .
          if git diff --cached --quiet; then
            echo "No GUMA OS changes to publish."
            exit 0
          fi

          git commit -m "Update GUMA OS"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}"
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 3
          done

          echo "Push failed after retries."
          exit 1
