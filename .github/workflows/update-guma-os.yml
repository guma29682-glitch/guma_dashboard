{"name":"GUMA OS Pages Deploy","on":{"workflow_dispatch":{},"schedule":[{"cron":"25 6 * * *"}]},"permissions":{"contents":"read","pages":"write","id-token":"write"},"concurrency":{"group":"guma-os-pages","cancel-in-progress":false},"env":{"DRIVE_FILE_ID":"1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J","ZIP_NAME":"guma_os_publish.zip","SITE_DIR":"site"},"jobs":{"deploy":{"name":"Publish GUMA OS ZIP to Pages","runs-on":"ubuntu-latest","environment":{"name":"github-pages","url":"${{ steps.deployment.outputs.page_url }}"},"steps":[{"name":"Checkout","uses":"actions/checkout@v4"},{"name":"Download publish ZIP from Google Drive","run":"set -euo pipefail\ncurl --fail --location --retry 5 --retry-delay 5 \"https://drive.google.com/uc?export=download&id=${DRIVE_FILE_ID}\" --output \"${ZIP_NAME}\"\ntest -s \"${ZIP_NAME}\"\nunzip -t \"${ZIP_NAME}\""},{"name":"Unpack site","run":"set -euo pipefail\nrm -rf \"${SITE_DIR}\"\nmkdir -p \"${SITE_DIR}\"\nunzip -o \"${ZIP_NAME}\" -d \"${SITE_DIR}\""},{"name":"Inspect JSON payload","run":"set -u\necho \"Files in site payload:\"\nfind \"${SITE_DIR}\" -maxdepth 4 -type f | sort\nif test -f \"${SITE_DIR}/data/latest.json\"; then\n  echo \"latest.json found\"\n  jq . \"${SITE_DIR}/data/latest.json\" || true\nelse\n  echo \"WARNING: ${SITE_DIR}/data/latest.json is missing\"\nfi\nif test -f \"${SITE_DIR}/data/manifest.json\"; then\n  echo \"manifest.json found\"\n  jq . \"${SITE_DIR}/data/manifest.json\" || true\n  latest_path=\"$(jq -r '.latest // .reportPath // empty' \"${SITE_DIR}/data/manifest.json\" 2>/dev/null || true)\"\n  if test -n \"${latest_path}\" && test -f \"${SITE_DIR}/${latest_path}\"; then\n    echo \"latest report (${latest_path}):\"\n    jq '{schemaVersion, generatedAt, period, title, date, summary: (.summary // [])[0:2]}' \"${SITE_DIR}/${latest_path}\" || true\n  fi\nelse\n  echo \"WARNING: ${SITE_DIR}/data/manifest.json is missing\"\nfi"},{"name":"Configure Pages","uses":"actions/configure-pages@v5"},{"name":"Upload Pages artifact","uses":"actions/upload-pages-artifact@v4","with":{"path":"${{ env.SITE_DIR }}"}},{"name":"Deploy to GitHub Pages","id":"deployment","uses":"actions/deploy-pages@v4"}]}}}
