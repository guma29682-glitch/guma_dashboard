{"name":"Update GUMA OS","on":{"workflow_dispatch":{},"schedule":[{"cron":"45 14 * * *"}]},"permissions":{"contents":"write","pages":"write","id-token":"write"},"concurrency":{"group":"guma-os-publish","cancel-in-progress":false},"jobs":{"update-and-deploy":{"runs-on":"ubuntu-latest","environment":{"name":"github-pages","url":"${{ steps.deployment.outputs.page_url }}"},"steps":[{"uses":"actions/checkout@v4","with":{"ref":"main","fetch-depth":0,"persist-credentials":true}},{"name":"Download ZIP","run":"CACHE_BUST=$(date +%s)\ncurl -L --fail -H 'Cache-Control: no-cache' \"https://drive.google.com/uc?export=download&id=1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J&cacheBust=${CACHE_BUST}\" -o guma_os_publish.zip\nfile guma_os_publish.zip\nunzip -t guma_os_publish.zip"},{"name":"Prepare site","run":"rm -rf _site\nmkdir _site\nunzip -o guma_os_publish.zip -d _site\ntouch _site/.nojekyll\ntest -f _site/index.html\ntest -f _site/data/latest.json\ntest -f _site/data/manifest.json\necho latest\njq '.generatedAt // .updatedAt // .latest' _site/data/latest.json\necho manifest\njq '.generatedAt // .updatedAt // .reports[0]' _site/data/manifest.json"},{"name":"Commit latest snapshot","continue-on-error":true,"run":"rm -rf data reports assets docs index.html app.js styles.css README.md .nojekyll\ncp -a _site/. .\ngit config user.name 'github-actions[bot]'\ngit config user.email '41898282+github-actions[bot]@users.noreply.github.com'\ngit status --short\ngit add -A\nif git diff --cached --quiet; then echo 'No GUMA OS changes to commit'; exit 0; fi\ngit commit -m 'Update GUMA OS'\ngit push origin HEAD:main"},{"name":"Configure Pages","uses":"actions/configure-pages@v5"},{"name":"Upload Pages artifact","uses":"actions/upload-pages-artifact@v3","with":{"path":"_site"}},{"name":"Deploy to GitHub Pages","id":"deployment","uses":"actions/deploy-pages@v4"}]}}}
