{"name":"GUMA OS Pages Deploy","on":{"workflow_dispatch":{},"schedule":[{"cron":"25 6 * * *"}]},"permissions":{"contents":"read","pages":"write","id-token":"write"},"concurrency":{"group":"guma-os-pages","cancel-in-progress":false},"env":{"DRIVE_FILE_ID":"1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J","ZIP_NAME":"guma_os_publish.zip","SITE_DIR":"site"},"jobs":{"deploy":{"name":"Publish GUMA OS ZIP to Pages","runs-on":"ubuntu-latest","environment":{"name":"github-pages","url":"${{ steps.deployment.outputs.page_url }}"},"steps":[{"name":"Checkout","uses":"actions/checkout@v4"},{"name":"Download publish ZIP from Google Drive","run":"echo \"Downloading ${ZIP_NAME} from Google Drive file ${DRIVE_FILE_ID}\"\nrm -f \"${ZIP_NAME}\"\ncurl --location --retry 5 --retry-delay 5 \"https://drive.google.com/uc?export=download&id=${DRIVE_FILE_ID}\" --output \"${ZIP_NAME}\" || true\nls -la\nif test -s \"${ZIP_NAME}\"; then\n  echo \"Downloaded ZIP candidate:\"\n  file \"${ZIP_NAME}\" || true\n  unzip -t \"${ZIP_NAME}\" || true\nelse\n  echo \"WARNING: ZIP was not downloaded or is empty\"\nfi\nexit 0"},{"name":"Prepare Pages payload","run":"rm -rf \"${SITE_DIR}\"\nmkdir -p \"${SITE_DIR}\"\nif test -s \"${ZIP_NAME}\" && unzip -t \"${ZIP_NAME}\" >/dev/null 2>&1; then\n  echo \"ZIP is valid, unpacking to ${SITE_DIR}\"\n  unzip -o \"${ZIP_NAME}\" -d \"${SITE_DIR}\" || true\nelse\n  echo \"WARNING: ZIP is missing or invalid, creating diagnostic fallback page\"\n  mkdir -p \"${SITE_DIR}/data\"\n  printf '%s\\n' '<!doctype html><html lang=\"cs\"><meta charset=\"utf-8\"><title>GUMA OS deploy diagnostic</title><body><h1>GUMA OS deploy diagnostic</h1><p>GitHub Action bezela, ale nepodarilo se stahnout nebo rozbalit ZIP z Google Drive.</p><p>Zkontroluj sdileni souboru guma_os_publish.zip a log kroku Download publish ZIP from Google Drive.</p></body></html>' > \"${SITE_DIR}/index.html\"\n  printf '%s\\n' '{\"schemaVersion\":\"diagnostic\",\"summary\":[\"ZIP missing or invalid during GitHub Actions deploy\"]}' > \"${SITE_DIR}/data/latest.json\"\n  printf '%s\\n' '{\"schemaVersion\":\"diagnostic\",\"latest\":\"data/latest.json\",\"reports\":[]}' > \"${SITE_DIR}/data/manifest.json\"\nfi\nprintf '%s\\n' > \"${SITE_DIR}/.nojekyll\"\nfind \"${SITE_DIR}\" -maxdepth 4 -type f | sort\nexit 0"},{"name":"Inspect JSON payload","run":"echo \"Inspecting JSON payload\"\nif test -f \"${SITE_DIR}/data/latest.json\"; then jq . \"${SITE_DIR}/data/latest.json\" || true; else echo \"latest.json missing\"; fi\nif test -f \"${SITE_DIR}/data/manifest.json\"; then jq . \"${SITE_DIR}/data/manifest.json\" || true; else echo \"manifest.json missing\"; fi\nexit 0"},{"name":"Configure Pages","uses":"actions/configure-pages@v5"},{"name":"Upload Pages artifact","uses":"actions/upload-pages-artifact@v4","with":{"path":"${{ env.SITE_DIR }}"}},{"name":"Deploy to GitHub Pages","id":"deployment","uses":"actions/deploy-pages@v4"}]}}}
