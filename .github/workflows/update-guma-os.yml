{"name":"Update GUMA OS","on":{"workflow_dispatch":{},"schedule":[{"cron":"15 6 * * *"}]},"permissions":{"contents":"read","pages":"write","id-token":"write"},"concurrency":{"group":"pages","cancel-in-progress":true},"jobs":{"deploy":{"environment":{"name":"github-pages","url":"${{ steps.deployment.outputs.page_url }}"},"runs-on":"ubuntu-latest","steps":[{"name":"Download GUMA OS publish ZIP","run":"CACHE_BUST=\"$(date +%s)\"\ncurl -L --fail -H \"Cache-Control: no-cache\" \"https://drive.google.com/uc?export=download&id=1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J&cacheBust=${CACHE_BUST}\" -o guma_os_publish.zip\nfile guma_os_publish.zip\nunzip -l guma_os_publish.zip"},{"name":"Unpack site","run":"mkdir -p _site\nunzip -o guma_os_publish.zip -d _site\nrm guma_os_publish.zip"},{"name":"Validate JSON","run":"jq empty _site/data/latest.json\njq empty _site/data/manifest.json\nfind _site/data/reports -name \"*.json\" -print0 | xargs -0 -I {} jq empty \"{}\"\necho \"Manifest after unpack:\"\njq '.reports[].date' _site/data/manifest.json"},{"name":"Configure Pages","uses":"actions/configure-pages@v5"},{"name":"Upload Pages artifact","uses":"actions/upload-pages-artifact@v3","with":{"path":"_site"}},{"name":"Deploy to GitHub Pages","id":"deployment","uses":"actions/deploy-pages@v4"}]}}}
