name: Update GUMA OS

on:
  workflow_dispatch:
  schedule:
    - cron: "45 17 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: guma-os-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download ZIP
        run: |
          CACHE_BUST=$(date +%s)
          curl -L --fail -H 'Cache-Control: no-cache' \
            "https://drive.google.com/uc?export=download&id=1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J&cacheBust=${CACHE_BUST}" \
            -o guma_os_publish.zip
          file guma_os_publish.zip
          unzip -t guma_os_publish.zip

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir _site
          unzip -o guma_os_publish.zip -d _site
          touch _site/.nojekyll

          test -f _site/index.html
          test -f _site/data/latest.json
          test -f _site/data/manifest.json

          echo latest
          jq '.generatedAt // .updatedAt // .latest' _site/data/latest.json
          echo manifest
          jq '.generatedAt // .updatedAt // .reports[0]' _site/data/manifest.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
