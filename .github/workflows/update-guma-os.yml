{"name":"GUMA OS Pages Deploy","on":{"workflow_dispatch":{},"schedule":[{"cron":"25 6 * * *"}]},"permissions":{"contents":"read","pages":"write","id-token":"write"},"concurrency":{"group":"guma-os-pages","cancel-in-progress":false},"env":{"DRIVE_FILE_ID":"1FiBqj-M_-rM1yKWnCzqsczn1L5r_D99J","ZIP_NAME":"guma_os_publish.zip","SITE_DIR":"site"},"jobs":{"deploy":{"name":"Publish GUMA OS ZIP to Pages","runs-on":"ubuntu-latest","environment":{"name":"github-pages","url":"${{ steps.deployment.outputs.page_url }}"},"steps":[{"name":"Checkout","uses":"actions/checkout@v4"},{"name":"Download publish ZIP from Google Drive","run":"set -euo pipefail\ncurl --fail --location --retry 5 --retry-delay 5 \"https://drive.google.com/uc?export=download&id=${DRIVE_FILE_ID}\" --output \"${ZIP_NAME}\"\ntest -s \"${ZIP_NAME}\"\nunzip -t \"${ZIP_NAME}\""},{"name":"Unpack site","run":"set -euo pipefail\nrm -rf \"${SITE_DIR}\"\nmkdir -p \"${SITE_DIR}\"\nunzip -o \"${ZIP_NAME}\" -d \"${SITE_DIR}\""},{"name":"Validate JSON payload","run":"set -euo pipefail\ntest -f \"${SITE_DIR}/data/latest.json\"\ntest -f \"${SITE_DIR}/data/manifest.json\"\njq -e '.schemaVersion and .summary' \"${SITE_DIR}/data/latest.json\" >/dev/null\njq -e '.latest and .reports and (.reports | length > 0)' \"${SITE_DIR}/data/manifest.json\" >/dev/null\nlatest_path=\"$(jq -r '.latest' \"${SITE_DIR}/data/manifest.json\")\"\ntest -f \"${SITE_DIR}/${latest_path}\"\njq -e '.schemaVersion and .summary' \"${SITE_DIR}/${latest_path}\" > /dev/null\njq -e '.reports | length > 0' \"${SITE_DIR}/data/manifest.json\" >/dev/null\nwhile IFS= read -r report; do\n  test -f \"${SITE_DIR}/${report}\"\n  jq -e '.schemaVersion and .summary' \"${SITE_DIR}/${report}\" > /dev/null\ndone < <(jq -r '.reports[] | .json // .path' \"${SITE_DIR}/data/manifest.json\")"},{"name":"Inspect Pages payload","run":"set -euo pipefail\necho \"Files that will be uploaded to Pages:\"\nfind \"${SITE_DIR}\" -maxdepth 4 -type f | sort\necho \"latest.json:\"\njq . \"${SITE_DIR}/data/latest.json\"\nlatest_path=\"$(jq -r '.latest' \"${SITE_DIR}/data/manifest.json\")\"\necho \"latest report (${latest_path}):\"\njq '{schemaVersion, generatedAt, period, summary: .summary[0:2]}' \"${SITE_DIR}/${latest_path}\""},{"name":"Configure Pages","uses":"actions/configure-pages@v5"},{"name":"Upload Pages artifact","uses":"actions/upload-pages-artifact@v4","with":{"path":"${{ env.SITE_DIR }}"}},{"name":"Deploy to GitHub Pages","id":"deployment","uses":"actions/deploy-pages@v4"}]}}}
