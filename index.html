<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GUMA OS</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">GUMA OS</p>
          <h1 id="report-title">Načítám dashboard…</h1>
        </div>
        <a id="doc-link" class="doc-link" href="#" target="_blank" rel="noreferrer">Google Doc</a>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Stručně</h2>
          <ul id="summary"></ul>
        </article>
        <article class="panel">
          <h2>Kalendář</h2>
          <div id="calendar"></div>
        </article>
        <article class="panel">
          <h2>Co připravit</h2>
          <ul id="prep"></ul>
        </article>
        <article class="panel">
          <h2>Zprávy a podklady</h2>
          <div id="related"></div>
        </article>
        <article class="panel">
          <h2>Svátek a svátky</h2>
          <ul id="name-days"></ul>
        </article>
        <article class="panel">
          <h2>Rizika</h2>
          <ul id="risks"></ul>
        </article>
        <article class="panel">
          <h2>Další kroky</h2>
          <ol id="next-steps"></ol>
        </article>
      </section>

      <section class="panel wide">
        <h2>Novinky</h2>
        <div id="news"></div>
      </section>

      <section class="panel wide">
        <h2>Historie</h2>
        <div id="history" class="history"></div>
      </section>
    </main>
    <script src="assets/app.js"></script>
  </body>
</html>
