<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GUMA OS</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GUMA OS</p>
          <h1 id="title">Načítám dashboard...</h1>
        </div>
        <time id="generated"></time>
      </header>

      <section class="band">
        <h2>Rychlý přehled</h2>
        <ul id="summary"></ul>
      </section>

      <section class="grid">
        <article>
          <h2>Kalendář</h2>
          <p id="day-shape"></p>
          <div id="events"></div>
        </article>
        <article>
          <h2>Další kroky</h2>
          <ol id="steps"></ol>
        </article>
      </section>

      <section class="band">
        <h2>Novinky</h2>
        <div id="news"></div>
      </section>

      <section class="grid">
        <article>
          <h2>Signály</h2>
          <div id="signals"></div>
        </article>
        <article>
          <h2>Rizika</h2>
          <ul id="risks"></ul>
        </article>
      </section>

      <section class="band">
        <h2>Historie</h2>
        <div id="history"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
