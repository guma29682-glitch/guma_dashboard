<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GUMA OS</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GUMA OS</p>
          <h1 id="report-title">Nacitani dashboardu</h1>
          <p id="report-meta" class="muted"></p>
        </div>
        <select id="history" aria-label="Historie reportu"></select>
      </header>

      <section class="grid">
        <article>
          <h2>Rychly prehled</h2>
          <ul id="summary"></ul>
        </article>
        <article>
          <h2>Kalendar</h2>
          <div id="calendar"></div>
        </article>
      </section>

      <section>
        <h2>Novinky</h2>
        <div id="news" class="news"></div>
      </section>

      <section class="grid">
        <article>
          <h2>Rizika a nejasnosti</h2>
          <ul id="risks"></ul>
        </article>
        <article>
          <h2>Dalsi kroky</h2>
          <ul id="next-steps"></ul>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
