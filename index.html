<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GUMA OS</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">GUMA OS</p>
        <h1>Denní dashboard</h1>
      </div>
      <time id="generatedAt"></time>
    </header>
    <main class="layout">
      <section class="panel primary">
        <div class="section-head">
          <h2 id="reportTitle">Načítám dashboard...</h2>
          <span id="reportDate" class="pill"></span>
        </div>
        <div id="summary" class="summary-grid"></div>
      </section>
      <section class="panel">
        <h2>Dnešní kalendář</h2>
        <div id="calendar"></div>
      </section>
      <section class="panel">
        <h2>Akční signály</h2>
        <div id="signals"></div>
      </section>
      <section class="panel">
        <h2>Novinky</h2>
        <div id="news"></div>
      </section>
      <section class="panel">
        <h2>Další kroky</h2>
        <ol id="nextSteps"></ol>
      </section>
      <aside class="panel history">
        <h2>Historie</h2>
        <div id="historyList"></div>
        <p class="muted">Historie načítá JSON snapshoty z <code>data/reports/</code>.</p>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
