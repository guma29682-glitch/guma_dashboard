<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GUMA OS</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GUMA OS</p>
          <h1>Denní dashboard</h1>
        </div>
        <time id="generatedAt">Nahrávám...</time>
      </header>

      <section class="status-strip" aria-label="Stav dne">
        <article>
          <span>Kalendář</span>
          <strong id="calendarStatus">...</strong>
        </article>
        <article>
          <span>Publikace</span>
          <strong id="publishStatus">...</strong>
        </article>
        <article>
          <span>Priorita</span>
          <strong id="priorityStatus">...</strong>
        </article>
      </section>

      <section class="layout">
        <aside class="history-panel">
          <h2>Historie</h2>
          <div id="historyList" class="history-list"></div>
        </aside>

        <article class="report">
          <p class="eyebrow" id="reportDate"></p>
          <h2 id="reportTitle">Načítám dashboard...</h2>
          <p id="reportSummary" class="lead"></p>
          <div id="sections" class="sections"></div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
