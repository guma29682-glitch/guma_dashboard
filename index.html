<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>GUMA OS</title>
    <link rel="stylesheet" href="assets/app.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigace">
        <div class="brand">
          <span class="brand-mark">G</span>
          <div>
            <strong>GUMA OS</strong>
            <span>osobni informacni system</span>
          </div>
        </div>
        <nav class="nav-list" id="moduleNav" aria-label="Moduly"></nav>
        <div class="sidebar-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="sidebarStatus">Nacitam posledni stav</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="generatedAt">Posledni aktualizace</p>
            <h1>GUMA OS</h1>
          </div>
          <div class="release-chip" id="releaseChip">starter</div>
        </header>

        <section class="overview" aria-labelledby="overviewTitle">
          <div>
            <p class="eyebrow">Dnesni priorita</p>
            <h2 id="overviewTitle">Nacitam dashboard</h2>
            <p id="overviewText">Chvilku strpeni, nacitam strukturovana data.</p>
          </div>
          <div class="run-panel">
            <span>Pristi cileny beh</span>
            <strong id="nextRun">-</strong>
          </div>
        </section>

        <section class="summary-strip" id="summaryStrip" aria-label="Kratke shrnuti"></section>

        <section class="content-grid">
          <div class="primary-panel">
            <div class="panel-heading">
              <p class="eyebrow">Modul</p>
              <h2 id="activeTitle">Prehled</h2>
            </div>
            <div id="moduleContent" class="module-content"></div>
          </div>

          <aside class="inspector" aria-label="Systemovy stav">
            <section>
              <p class="eyebrow">Stav</p>
              <h2 id="healthLabel">-</h2>
              <p id="healthNotes">-</p>
            </section>
            <section>
              <p class="eyebrow">Historie</p>
              <div id="historyList" class="history-list"></div>
            </section>
            <section>
              <p class="eyebrow">Zdroje</p>
              <div id="sourceList" class="source-list"></div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <strong>Zatim bez dat.</strong>
        <span>Modul je pripraveny, dalsi beh ho muze naplnit.</span>
      </div>
    </template>

    <script src="assets/app.js"></script>
  </body>
</html>
